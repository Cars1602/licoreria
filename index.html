<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Licoreria</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Licoreria</h1>
      <p class="muted">Inicia sesion para continuar</p>
      <div id="loginNotice" class="hidden"></div>
      <form id="loginForm">
        <div class="grid">
          <input class="input" type="email" name="email" placeholder="Correo" required>
          <input class="input" type="password" name="password" placeholder="Contrasena" required>
          <button class="button" type="submit">Entrar</button>
        </div>
      </form>
    </div>
  </div>
  <script src="./assets/app.js"></script>
  <script src="./assets/pages/index.js"></script>
</body>
</html>
