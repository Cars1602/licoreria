<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS | Licoreria</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <div>
        <h1 style="margin:0;">Punto de Venta</h1>
        <p class="muted" id="posSubtitle">Cargando...</p>
      </div>
      <a class="button secondary" href="./employee">Volver</a>
    </div>

    <div id="posNotice" class="hidden"></div>

    <div class="content-grid">
      <section class="surface-card">
        <h3>Escaneo rapido</h3>
        <div class="grid">
          <input class="input" id="scanInput" placeholder="PROD:2100000000017 o codigo de barras">
          <button class="button" id="scanButton">Agregar al carrito</button>
        </div>
        <video id="posScannerVideo" class="scanner-video hidden" autoplay playsinline muted></video>
        <div class="inline-actions" style="margin-top:14px;">
          <button class="button secondary compact" id="startScannerButton" type="button">Iniciar camara</button>
          <button class="button secondary compact" id="stopScannerButton" type="button">Detener camara</button>
        </div>
      </section>

      <section class="surface-card">
        <h3>Conexion por celular</h3>
        <p class="muted">Escanea este QR desde el celular para abrir el lector movil y agregar productos al carrito.</p>
        <div class="qr-box">
          <img id="connectQrImage" alt="QR de conexion POS">
          <p class="muted" id="connectUrlText"></p>
        </div>
      </section>
    </div>

    <div class="content-grid" style="margin-top:18px;">
      <section class="surface-card">
        <h3>Cobro</h3>
        <form id="finalizeForm" class="stack-form">
          <select class="select" id="paymentMethod" name="payment_method">
            <option value="CASH">CASH</option>
            <option value="CARD">CARD</option>
            <option value="QR">QR</option>
          </select>
          <input class="input" type="number" id="discount" name="discount" value="0" min="0" step="0.01" placeholder="Descuento">
          <input class="input" type="number" id="cashReceived" name="cash_received" value="0" min="0" step="0.01" placeholder="Pago con">
          <input class="input" type="text" id="totalPayable" readonly placeholder="Total">
          <input class="input" type="text" id="changeDue" readonly placeholder="Cambio">
          <div id="qrBox" class="qr-box hidden">
            <p class="muted" id="qrLabel"></p>
            <img id="qrImage" alt="QR de pago">
            <label class="checkline"><input type="checkbox" id="qrConfirmed" name="qr_confirmed" value="1"> Confirmo el pago por QR</label>
          </div>
          <button class="button" type="submit">Finalizar venta</button>
        </form>
      </section>

      <section class="surface-card">
        <h3>Carrito</h3>
        <div class="table-wrap">
          <table class="table" id="cartTable">
            <thead><tr><th>Producto</th><th>Codigo</th><th>Cant.</th><th>Precio</th><th>Subt.</th></tr></thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
  <script src="./assets/app.js"></script>
  <script src="./assets/pages/pos.js"></script>
</body>
</html>
