<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <div id="adminRoot"></div>

  <script>window.APP_BASE_URL='';</script>
  <script src="./assets/app.js"></script>
  <script src="./assets/admin-common.js"></script>
  <script>
    const state = { products: [], categories: [], brands: [], suppliers: [], query: '' };

    function fillProductForm(formId, product = null) {
      const form = document.getElementById(formId);
      form.reset();
      form.querySelector('[name="id"]').value = product?.id || '';
      form.querySelector('[name="barcode"]').value = product?.barcode || '';
      form.querySelector('[name="name"]').value = product?.name || '';
      form.querySelector('[name="cost"]').value = product?.cost || 0;
      form.querySelector('[name="price"]').value = product?.price || 0;
      form.querySelector('[name="stock"]').value = product?.stock || 0;
      form.querySelector('[name="stock_min"]').value = product?.stock_min || 0;
      form.querySelector('[name="unit"]').value = product?.unit || 'und';
      form.querySelector('[name="expires_at"]').value = product?.expires_at ? String(product.expires_at).slice(0, 10) : '';
      form.querySelector('[name="category_id"]').value = product?.category_id || '';
      form.querySelector('[name="brand_id"]').value = product?.brand_id || '';
      form.querySelector('[name="supplier_id"]').value = product?.supplier_id || '';
      form.querySelector('[name="image_url"]').value = product?.image_url || '';
      form.querySelector('[name="qr_payload"]').value = product?.qr_payload || '';
      form.querySelector('[name="active"]').checked = Boolean(product ? product.active : true);
    }

    function catalogOptions(items, emptyLabel) {
      return `<option value="">${emptyLabel}</option>` +
        items.map((item) => `<option value="${item.id}">${item.name}</option>`).join('');
    }

    function renderSelects() {
      document.querySelectorAll('[data-category-select]').forEach((element) => {
        element.innerHTML = catalogOptions(state.categories, 'Sin categoria');
      });
      document.querySelectorAll('[data-brand-select]').forEach((element) => {
        element.innerHTML = catalogOptions(state.brands, 'Sin marca');
      });
      document.querySelectorAll('[data-supplier-select]').forEach((element) => {
        element.innerHTML = catalogOptions(state.suppliers, 'Sin proveedor principal');
      });
    }

    function productMatchesQuery(product) {
      const query = state.query.trim().toLowerCase();
      if (!query) return true;
      return [
        product.name,
        product.barcode,
        product.category_name,
        product.brand_name,
        product.supplier_name,
      ].some((value) => String(value || '').toLowerCase().includes(query));
    }

    function productImage(product) {
      return resolveApiAssetUrl(product.image_url || '');
    }

    function renderProducts() {
      const items = state.products.filter(productMatchesQuery);
      document.getElementById('productsCounter').textContent = `${items.length} producto(s)`;
      document.getElementById('productsCards').innerHTML = items.length
        ? items.map((product) => `
            <article class="product-card ${product.active ? '' : 'is-inactive'}">
              <div class="product-card-media">
                ${product.image_url
                  ? `<img src="${productImage(product)}" alt="${product.name}" onerror="this.replaceWith(Object.assign(document.createElement('div'), { className: 'product-card-fallback', textContent: 'Sin imagen' }))">`
                  : `<div class="product-card-fallback">Sin imagen</div>`
                }
              </div>
              <div class="product-card-body">
                <div class="section-header">
                  <div>
                    <h3>${product.name}</h3>
                    <p class="muted">Codigo: ${product.barcode}</p>
                  </div>
                  <span class="product-status ${product.active ? 'active' : 'inactive'}">${product.active ? 'Activo' : 'Inactivo'}</span>
                </div>
                <div class="product-meta">
                  <span class="chip">Categoria: ${product.category_name || 'Sin categoria'}</span>
                  <span class="chip">Marca: ${product.brand_name || 'Sin marca'}</span>
                  <span class="chip">Proveedor: ${product.supplier_name || 'Sin proveedor'}</span>
                </div>
                <div class="metric-grid compact" style="margin-top:14px;">
                  <div class="metric-card"><small>Stock</small><strong>${product.stock}</strong></div>
                  <div class="metric-card"><small>Minimo</small><strong>${product.stock_min}</strong></div>
                  <div class="metric-card"><small>Costo</small><strong>Bs ${money(product.cost)}</strong></div>
                  <div class="metric-card"><small>Precio</small><strong>Bs ${money(product.price)}</strong></div>
                </div>
                <div class="inline-actions" style="margin-top:14px;">
                  <button class="button secondary compact" type="button" data-edit-id="${product.id}">Editar</button>
                  <button class="button compact" type="button" data-qr-id="${product.id}">Ver QR</button>
                </div>
              </div>
            </article>
          `).join('')
        : '<p class="muted">No hay productos que coincidan con la busqueda.</p>';
    }

    async function loadProducts() {
      const data = await api('/api/admin/products');
      state.products = data.items || [];
      state.categories = data.categories || [];
      state.brands = data.brands || [];
      state.suppliers = data.suppliers || [];
      renderSelects();
      renderProducts();
      fillProductForm('productForm');
    }

    async function showQr(productId) {
      const data = await api(`/api/admin/products/${productId}/qr`);
      document.getElementById('qrProductTitle').textContent = data.product.name;
      document.getElementById('qrProductPayload').textContent = data.payload;
      document.getElementById('qrPreview').src = data.qrDataUrl;
      document.getElementById('qrPreviewWrap').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('productEditModal').classList.add('hidden');
    }

    function openEditModal(product) {
      fillProductForm('productEditForm', product);
      document.getElementById('productEditModalTitle').textContent = `Editar ${product.name}`;
      document.getElementById('productEditModal').classList.remove('hidden');
    }

    (async () => {
      await bootAdminPage({
        key: 'products',
        pageTitle: 'Productos',
        pageHeading: 'PRODUCTOS',
        pageDescription: 'Alta, edicion y QR individual por producto',
        content: `
          <div class="content-grid">
            <section class="surface-card">
              <div class="section-header">
                <h3>Formulario de producto</h3>
                <button class="button secondary compact" id="newProductButton" type="button">Nuevo</button>
              </div>
              <form id="productForm" action="javascript:void(0);">
                <input type="hidden" name="id">
                <div class="form-grid">
                  <input class="input" name="barcode" placeholder="Codigo de barras" required>
                  <input class="input" name="name" placeholder="Nombre" required>
                  <input class="input" type="number" step="0.01" min="0" name="cost" placeholder="Costo">
                  <input class="input" type="number" step="0.01" min="0" name="price" placeholder="Precio">
                  <input class="input" type="number" step="0.001" min="0" name="stock" placeholder="Stock">
                  <input class="input" type="number" step="0.001" min="0" name="stock_min" placeholder="Stock minimo">
                  <input class="input" name="unit" placeholder="Unidad">
                  <input class="input" type="date" name="expires_at">
                  <select class="select" name="category_id" data-category-select></select>
                  <select class="select" name="brand_id" data-brand-select></select>
                  <select class="select" name="supplier_id" data-supplier-select></select>
                  <input class="input" name="image_url" placeholder="URL de imagen">
                  <input class="input" name="qr_payload" placeholder="Payload QR opcional">
                </div>
                <div class="form-actions">
                  <label class="checkline"><input type="checkbox" name="active" value="1" checked> Producto activo</label>
                  <button class="button" type="submit">Guardar producto</button>
                </div>
              </form>
            </section>

            <section class="surface-card">
              <h3>QR del producto</h3>
              <p class="muted">Este QR se puede imprimir en la etiqueta. El POS y el celular lo reconocen para agregar el producto al carrito.</p>
              <div id="qrPreviewWrap" class="hidden">
                <img id="qrPreview" alt="QR del producto">
                <h4 id="qrProductTitle"></h4>
                <p class="muted" id="qrProductPayload"></p>
                <div class="inline-actions" style="margin-top:14px;">
                  <button class="button secondary compact" id="printQrButton" type="button">Imprimir QR</button>
                </div>
              </div>
            </section>
          </div>

          <section class="surface-card" style="margin-top:18px;">
            <div class="section-header">
              <div>
                <h3>Catalogo visual</h3>
                <p class="muted" id="productsCounter">0 producto(s)</p>
              </div>
              <input class="input compact-input" id="productSearch" placeholder="Buscar por nombre, codigo, marca o proveedor">
            </div>
            <div id="productsCards" class="product-card-grid"></div>
          </section>

          <div id="productEditModal" class="modal-backdrop hidden">
            <div class="modal-panel">
              <div class="section-header">
                <div>
                  <h3 id="productEditModalTitle">Editar producto</h3>
                  <p class="muted">Modifica los datos del producto sin salir del catalogo.</p>
                </div>
                <button class="button secondary compact" type="button" id="closeProductEditModal">Cerrar</button>
              </div>
              <form id="productEditForm" class="stack-form" action="javascript:void(0);">
                <input type="hidden" name="id">
                <div class="form-grid">
                  <input class="input" name="barcode" placeholder="Codigo de barras" required>
                  <input class="input" name="name" placeholder="Nombre" required>
                  <input class="input" type="number" step="0.01" min="0" name="cost" placeholder="Costo">
                  <input class="input" type="number" step="0.01" min="0" name="price" placeholder="Precio">
                  <input class="input" type="number" step="0.001" min="0" name="stock" placeholder="Stock">
                  <input class="input" type="number" step="0.001" min="0" name="stock_min" placeholder="Stock minimo">
                  <input class="input" name="unit" placeholder="Unidad">
                  <input class="input" type="date" name="expires_at">
                  <select class="select" name="category_id" data-category-select></select>
                  <select class="select" name="brand_id" data-brand-select></select>
                  <select class="select" name="supplier_id" data-supplier-select></select>
                  <input class="input" name="image_url" placeholder="URL de imagen">
                  <input class="input" name="qr_payload" placeholder="Payload QR opcional">
                </div>
                <div class="form-actions">
                  <label class="checkline"><input type="checkbox" name="active" value="1" checked> Producto activo</label>
                  <button class="button" type="submit">Guardar cambios</button>
                </div>
              </form>
            </div>
          </div>
        `,
      });

      await loadProducts();

      async function submitProductForm(form, isEdit = false) {
        const payload = Object.fromEntries(new FormData(form).entries());
        payload.active = form.querySelector('[name="active"]').checked ? '1' : '0';

        if (isEdit) {
          await api(`/api/admin/products/${payload.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          closeEditModal();
        } else {
          await api('/api/admin/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          fillProductForm('productForm');
        }
        await loadProducts();
      }

      document.getElementById('newProductButton').addEventListener('click', () => fillProductForm('productForm'));
      document.getElementById('productForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await submitProductForm(event.currentTarget, false);
          setNotice('adminNotice', 'Producto guardado correctamente', 'success');
        } catch (error) {
          setNotice('adminNotice', error.message, 'error');
        }
      });
      document.getElementById('productEditForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
          await submitProductForm(event.currentTarget, true);
          setNotice('adminNotice', 'Producto actualizado correctamente', 'success');
        } catch (error) {
          setNotice('adminNotice', error.message, 'error');
        }
      });
      document.getElementById('closeProductEditModal').addEventListener('click', closeEditModal);
      document.getElementById('productEditModal').addEventListener('click', (event) => {
        if (event.target.id === 'productEditModal') closeEditModal();
      });

      document.getElementById('productSearch').addEventListener('input', (event) => {
        state.query = event.currentTarget.value || '';
        renderProducts();
      });

      document.getElementById('productsCards').addEventListener('click', async (event) => {
        const editButton = event.target.closest('[data-edit-id]');
        const qrButton = event.target.closest('[data-qr-id]');

        if (editButton) {
          const product = state.products.find((item) => item.id === editButton.dataset.editId);
          if (product) openEditModal(product);
        }

        if (qrButton) {
          try {
            await showQr(qrButton.dataset.qrId);
          } catch (error) {
            setNotice('adminNotice', error.message, 'error');
          }
        }
      });

      document.getElementById('printQrButton').addEventListener('click', () => {
        const qrImg = document.getElementById('qrPreview').src;
        if (!qrImg) {
          setNotice('adminNotice', 'Primero genera o visualiza el QR del producto.', 'error');
          return;
        }
        const printWindow = window.open('', '_blank');
        const title = document.getElementById('qrProductTitle').textContent;
        const payload = document.getElementById('qrProductPayload').textContent;
        printWindow.document.write(`
          <html>
            <head>
              <title>QR de Producto</title>
              <style>
                body { font-family: Arial, sans-serif; text-align: center; margin: 20px; }
                img { max-width: 300px; }
              </style>
            </head>
            <body>
              <h2>${title}</h2>
              <img src="${qrImg}" alt="QR">
              <p>${payload}</p>
            </body>
          </html>
        `);
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
      });
    })().catch((error) => setNotice('adminNotice', error.message, 'error'));
  </script>
</body>
</html>
