<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Movil</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <div class="employee-app">
    <div class="employee-shell">
      <div class="employee-header">
        <div>
          <h1>POS Movil</h1>
          <p id="mobileSubtitle">Conectando con la sesion POS...</p>
        </div>
      </div>

      <div id="mobileNotice" class="hidden"></div>

      <div class="content-grid">
        <section class="surface-card">
          <h3>Escanear producto</h3>
          <p class="muted">Escanea el QR del producto desde este celular para agregarlo al carrito del POS.</p>
          <video id="mobileVideo" class="scanner-video hidden" autoplay playsinline muted></video>
          <div class="inline-actions">
            <button class="button" id="startScanButton" type="button">Iniciar camara</button>
            <button class="button secondary" id="stopScanButton" type="button">Detener</button>
          </div>
          <div class="stack-form" style="margin-top:14px;">
            <input class="input" id="manualQrInput" placeholder="PROD:codigo o barcode">
            <button class="button secondary" id="manualAddButton" type="button">Agregar manualmente</button>
          </div>
        </section>

        <section class="surface-card">
          <h3>Carrito remoto</h3>
          <div class="table-wrap">
            <table class="table" id="mobileCartTable">
              <thead><tr><th>Producto</th><th>Cant.</th><th>Precio</th><th>Subt.</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script src="./assets/app.js"></script>
  <script src="./assets/pages/mobile-pos.js"></script>
</body>
</html>
