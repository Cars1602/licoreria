<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empleado | Licoreria</title>
  <link rel="stylesheet" href="./assets/app.css">
</head>
<body>
  <div class="employee-app">
    <div class="employee-shell hidden" id="employeeShell">
      <div class="employee-header">
        <div>
          <h1>POS Empleado</h1>
          <p id="employeeSubtitle">Cargando...</p>
        </div>
        <div class="inline-actions">
          <button class="button secondary" id="openPosButton">Ir al POS</button>
          <button class="button danger" id="logoutButton">Cerrar sesion</button>
        </div>
      </div>

      <div id="employeeNotice" class="hidden"></div>

      <div class="employee-grid">
        <section class="surface-card">
          <h3>Datos del empleado</h3>
          <div class="employee-data" id="employeeData"></div>
        </section>

        <section class="surface-card">
          <h3>Sesion POS activa</h3>
          <p class="muted" id="employeeSessionText">Cargando estado del POS...</p>
          <div class="inline-actions">
            <button class="button" id="openPosInlineButton">Abrir POS</button>
          </div>
        </section>
      </div>

      <section class="surface-card" style="margin-top:18px;">
        <h3>Resumen del dia</h3>
        <div class="metric-grid compact" id="employeeStats"></div>
      </section>

      <section class="surface-card" style="margin-top:18px;">
        <div class="section-header">
          <div>
            <h3>Buscar producto</h3>
            <p class="muted">Consulta si hay stock disponible y mira la imagen del producto.</p>
          </div>
          <input class="input compact-input" id="employeeProductSearch" placeholder="Buscar por nombre, codigo, marca o proveedor">
        </div>
        <div id="employeeProductResults" class="product-card-grid"></div>
      </section>

      <section class="surface-card" style="margin-top:18px;">
        <h3>Ultimas ventas</h3>
        <div class="table-wrap">
          <table class="table" id="recentSalesTable">
            <thead>
              <tr>
                <th>Factura</th>
                <th>Metodo</th>
                <th>Total</th>
                <th>Fecha</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>

  <script src="./assets/app.js"></script>
  <script src="./assets/pages/employee.js"></script>
</body>
</html>
